services:
  postgres:
    image: postgres:16-alpine
    container_name: student-weather-postgres
    ports:
      - "15432:5432"
    env_file:
      - .env
    environment:
      - POSTGRES_DB=student_weather
      - POSTGRES_USER=student_weather_user
      - POSTGRES_PASSWORD=secure_password_for_student_weather
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U student_weather_user -d student_weather"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: student-weather-backend
    ports:
      - "18080:8000"
    env_file:
      - .env
    environment:
      - CORS_ALLOWED_ORIGINS=http://localhost:15173
      - DATABASE_URL=postgresql+asyncpg://student_weather_user:secure_password_for_student_weather@postgres:5432/student_weather
      - RUN_MIGRATIONS=true
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: http://localhost:18080
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
        VITE_GA_MEASUREMENT_ID: ${VITE_GA_MEASUREMENT_ID:-}
    container_name: student-weather-frontend
    ports:
      - "15173:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
